name: Daily Alpha Generation

on:
  schedule:
    # Runs at 03:00 UTC every day (08:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows you to click a "Run Now" button manually

# Explicitly grant permissions so the bot can save the AI Memory DB
permissions:
  contents: write

# Opt into the new Node.js 24 engine to silence the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-investment-os:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # <-- UPGRADED to v4

      - name: Setup Python
        uses: actions/setup-python@v5 # <-- UPGRADED to v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Investment OS (Cron Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --cron

      - name: Save AI Memory & Logs to GitHub
        run: |
          git config --global user.name "Investment-OS-Bot"
          git config --global user.email "bot@investmentos.local"
          git add data/market_memory.db app.log
          # Only commit if there are changes to avoid workflow errors
          git commit -m "🤖 Auto-Update AI Memory & Logs" || echo "No changes to commit"
          git push