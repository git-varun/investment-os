name: Daily Alpha Generation

on:
  schedule:
    # Runs daily at 03:00 UTC (08:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows you to trigger it manually via the "Run workflow" button

# Grants the bot permission to push the SQLite Memory database back to your repo
permissions:
  contents: write

# Silences the GitHub Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-investment-os:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs packages from your newly cleaned requirements.txt
          pip install -r requirements.txt

      - name: Run Investment OS (Cron Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --cron

      - name: Save AI Memory & Logs to GitHub
        run: |
          git config --global user.name "Investment-OS-Bot"
          git config --global user.email "bot@investmentos.local"
          
          # Safe creation
          touch app.log
          mkdir -p data && touch data/market_memory.db
          
          # FORCE ADD (-f) bypasses your .gitignore file safely
          git add -f data/market_memory.db app.log
          
          # Commit and Push
          git commit -m "🤖 Auto-Update AI Memory & Logs" || echo "No changes to commit"
          git push