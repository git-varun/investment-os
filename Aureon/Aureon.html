<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Aureon</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shell.css"/>
<link rel="stylesheet" href="lib/tokens.css"/>
<link rel="stylesheet" href="lib/colors_and_type.css"/>
<style>
  html, body { overflow: auto; }
  main > div[key] { animation: cardEnter 220ms var(--ease-decel) both; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 999px; border: 2px solid var(--canvas); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
  ::-webkit-scrollbar-track { background: transparent; }
  .step-active { box-shadow: 0 0 0 1px rgba(201,168,106,0.30), 0 8px 24px rgba(0,0,0,0.30); }
  .layer-1 { position: relative; }
  button.du3-cta { font-family: var(--font-ui); }
  .sb-item:hover:not(.is-active) { background: rgba(255,255,255,0.025) !important; }
  input::placeholder { color: var(--ink-40); }
  @keyframes spin { to { transform: rotate(360deg) } }
  @media (max-width: 767px) {
    .bottom-nav { display: flex !important; }
    aside { display: none !important; }
    main > div[key] { padding-bottom: 72px; }
  }
  @media (max-width: 640px) {
    /* Dashboard hero: stack vertically, hide secondary blocks */
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-insight, .hero-donut { display: none !important; }
    .hero-networth-value { font-size: clamp(32px, 10vw, 56px) !important; }
    /* Lifecycle strip: hide full grid on tiny screens */
    .lifecycle-strip { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Decision engine libs -->
<script type="text/babel" src="lib/decisions.jsx"></script>
<script type="text/babel" src="lib/primitives.jsx"></script>
<script type="text/babel" src="lib/flow.jsx"></script>

<!-- App data + UI primitives -->
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/data-extra.jsx"></script>
<script type="text/babel" src="app/data-india.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>

<!-- Pages -->
<script type="text/babel" src="app/page-dashboard.jsx"></script>
<script type="text/babel" src="app/page-portfolio.jsx"></script>
<script type="text/babel" src="app/page-asset.jsx"></script>
<script type="text/babel" src="app/page-other.jsx"></script>
<script type="text/babel" src="app/page-notifications.jsx"></script>
<script type="text/babel" src="app/page-settings.jsx"></script>


<script type="text/babel" src="app/page-auth.jsx"></script>
<script type="text/babel" src="app/page-onboarding.jsx"></script>
<script type="text/babel" src="app/page-markets.jsx"></script>
<script type="text/babel" src="app/page-terminal.jsx"></script>
<script type="text/babel" src="app/page-theme.jsx"></script>
<script type="text/babel" src="app/page-watchlist.jsx"></script>

<!-- Extended page components -->
<script type="text/babel" src="app/page-dashboard-ext.jsx"></script>
<script type="text/babel" src="app/page-signals-ext.jsx"></script>
<script type="text/babel" src="app/page-portfolio-ext.jsx"></script>
<script type="text/babel" src="app/page-settings-ext.jsx"></script>

<!-- Currency · jobs · extended components -->
<script type="text/babel" src="app/currency-jobs.jsx"></script>
<script type="text/babel" src="app/page-watchlist-ext.jsx"></script>
<script type="text/babel" src="app/page-asset-ext.jsx"></script>

<!-- Shell components — suppress standalone render -->
<script>window.__SKIP_SHELL_ROOT = true;</script>
<script type="text/babel" src="app/shell-components.jsx"></script>

<!-- App entry point -->
<script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
