x-backend-common: &backend-common
  build:
    context: ./backend
  env_file: .env
  environment: &backend-env
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@aureon-db:5432/${POSTGRES_DB:-aureon}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    FAST2SMS_API_KEY: ${FAST2SMS_API_KEY}
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./backend:/app
    - /app/.venv
    - ./data:/app/data
    - ./logs:/app/logs
  depends_on:
    aureon-db:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - aureon_network
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  aureon-db:
    image: postgres:16-alpine
    container_name: aureon_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aureon}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: aureon_redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aureon_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    <<: *backend-common
    container_name: aureon_api
    ports:
      - "${API_PORT:-8001}:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health/ready" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  celery_worker:
    <<: *backend-common
    container_name: aureon_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q celery,price-queue,ai-queue,pipeline-queue

  celery_beat:
    <<: *backend-common
    container_name: aureon_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info --schedule=/app/data/celerybeat-schedule

  frontend:
    image: node:22-alpine
    container_name: aureon_frontend
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://api:8001
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aureon_network
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  aureon_network:
    driver: bridge