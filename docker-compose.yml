x-backend-common: &backend-common
  build:
    context: ./backend
  env_file: .env
  environment: &backend-env
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aureon
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./backend:/app
    - ./data:/app/data
    - ./logs:/app/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - aureon_network
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aureon_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aureon
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: aureon_redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: aureon_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aureon_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    <<: *backend-common
    container_name: aureon_api
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    <<: *backend-common
    container_name: aureon_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    <<: *backend-common
    container_name: aureon_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    image: node:22-alpine
    container_name: aureon_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - aureon_network
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  aureon_network:
    driver: bridge